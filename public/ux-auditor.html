<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>UX Auditor</title>
    <style>
      :root {
        color-scheme: dark;
        --phone-w: min(430px, calc(100vw - 42px));
        --phone-h: min(932px, calc(100vh - 54px));
        --screen-radius: 46px;
      }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 0%, rgba(59, 130, 246, 0.28), transparent 38%),
          linear-gradient(135deg, #06111f, #020611 58%, #111827);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .stage {
        width: 100vw;
        height: 100vh;
        display: grid;
        grid-template-columns: 1fr minmax(220px, 320px);
        gap: 18px;
        align-items: center;
        justify-items: center;
        padding: 22px;
      }
      .phone {
        position: relative;
        width: var(--phone-w);
        height: var(--phone-h);
        border-radius: 66px;
        padding: 14px;
        background: linear-gradient(145deg, #eef4fb 0%, #7b8798 7%, #202938 17%, #f4f8ff 27%, #6b7280 38%, #111827 100%);
        box-shadow: 0 34px 90px rgba(0, 0, 0, 0.58), inset 0 0 0 2px rgba(255, 255, 255, 0.42), inset 0 0 0 8px rgba(12, 17, 27, 0.72);
      }
      .phone::before, .phone::after, .buttons {
        content: "";
        position: absolute;
        width: 7px;
        border-radius: 999px;
        background: linear-gradient(180deg, #d7dde7, #6b7280);
      }
      .phone::before { left: -5px; top: 178px; height: 72px; }
      .phone::after { right: -5px; top: 282px; height: 120px; }
      .buttons { left: -5px; top: 274px; height: 92px; }
      .screen-shell {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: var(--screen-radius);
        padding: 10px;
        background: #02050c;
        overflow: hidden;
      }
      .screen {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: calc(var(--screen-radius) - 12px);
        background: #fff;
        overflow: hidden;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #fff;
      }
      .island {
        position: absolute;
        z-index: 5;
        top: 16px;
        left: 50%;
        width: 148px;
        height: 38px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #02040b;
        pointer-events: none;
      }
      .island::after {
        content: "";
        position: absolute;
        right: 28px;
        top: 10px;
        width: 18px;
        height: 18px;
        border-radius: 999px;
        background: radial-gradient(circle at 40% 35%, #10224c, #071021);
      }
      .cursor {
        position: fixed;
        z-index: 20;
        width: 28px;
        height: 28px;
        margin: -14px 0 0 -14px;
        border-radius: 999px;
        border: 3px solid #0ea5e9;
        background: rgba(14, 165, 233, 0.18);
        box-shadow: 0 0 0 10px rgba(14, 165, 233, 0.12);
        transform: translate(-200px, -200px);
        transition: transform 480ms cubic-bezier(.2, .8, .2, 1), scale 160ms ease;
        pointer-events: none;
      }
      .cursor.clicking { scale: .72; background: rgba(14, 165, 233, 0.38); }
      .highlight {
        position: fixed;
        z-index: 19;
        border: 3px solid #22c55e;
        border-radius: 14px;
        box-shadow: 0 0 0 9999px rgba(2, 6, 23, 0.12);
        pointer-events: none;
        transition: all 220ms ease;
      }
      .panel {
        align-self: stretch;
        width: 100%;
        max-height: calc(100vh - 44px);
        overflow: auto;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 22px;
        color: #e5eef8;
        background: rgba(2, 6, 23, 0.68);
        padding: 16px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.34);
      }
      .panel h1 { margin: 0 0 10px; font-size: 18px; }
      .panel button {
        width: 100%;
        margin: 8px 0;
        border: 0;
        border-radius: 12px;
        padding: 10px 12px;
        color: #04111f;
        background: #38bdf8;
        font-weight: 800;
        cursor: pointer;
      }
      .status { color: #93c5fd; font-size: 13px; line-height: 1.45; }
      .log { margin-top: 12px; font-size: 12px; line-height: 1.45; white-space: pre-wrap; }
      @media (max-width: 820px) {
        .stage { grid-template-columns: 1fr; overflow: auto; }
        .panel { display: none; }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <section class="phone" aria-label="iPhone UX audit frame">
        <div class="buttons" aria-hidden="true"></div>
        <div class="screen-shell">
          <div class="screen">
            <div class="island" aria-hidden="true"></div>
            <iframe id="appFrame" src="/" title="Audited app"></iframe>
          </div>
        </div>
      </section>
      <aside class="panel">
        <h1>UX Auditor</h1>
        <div id="status" class="status">Ready. Autopilot will click only safe visible controls.</div>
        <button id="startBtn" type="button">Start visual pass</button>
        <button id="stopBtn" type="button">Stop and send report</button>
        <div id="log" class="log"></div>
      </aside>
    </main>
    <div id="cursor" class="cursor" aria-hidden="true"></div>
    <div id="highlight" class="highlight" aria-hidden="true" hidden></div>
    <script>
      const params = new URLSearchParams(location.search);
      const frame = document.getElementById('appFrame');
      const cursor = document.getElementById('cursor');
      const highlight = document.getElementById('highlight');
      const statusEl = document.getElementById('status');
      const logEl = document.getElementById('log');
      const endpoint = params.get('endpoint') || 'http://127.0.0.1:4174/report';
      const target = params.get('target') || '/';
      const maxClicks = Number(params.get('maxClicks') || 80);
      let stopped = false;
      const startedAt = new Date().toISOString();
      const actions = [];
      const findings = [];
      const visited = new Set();

      frame.src = target;

      function wait(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }
      function log(message) {
        const line = `[${new Date().toLocaleTimeString()}] ${message}`;
        logEl.textContent += line + '\n';
        logEl.scrollTop = logEl.scrollHeight;
        statusEl.textContent = message;
      }
      function frameDoc() {
        try { return frame.contentWindow.document; }
        catch (error) {
          findings.push({ priority: 'Critical', title: 'Cannot inspect iframe DOM', detail: String(error) });
          return null;
        }
      }
      function isVisible(el) {
        const style = frame.contentWindow.getComputedStyle(el);
        const rect = el.getBoundingClientRect();
        return rect.width > 8 && rect.height > 8 && style.visibility !== 'hidden' && style.display !== 'none' && Number(style.opacity || 1) > 0.05;
      }
      function label(el) {
        return (el.getAttribute('aria-label') || el.innerText || el.value || el.placeholder || el.title || el.href || el.tagName).trim().replace(/\s+/g, ' ').slice(0, 80);
      }
      function isDangerous(el) {
        const text = label(el).toLowerCase();
        return /(delete|remove|logout|log out|sign out|pay|purchase|subscribe|clear|reset|destroy|удал|выйти|оплат|купить|очист|сброс|отправить заказ|подпис)/i.test(text);
      }
      function selectorList(doc) {
        return Array.from(doc.querySelectorAll('button, a[href], input, select, textarea, [role="button"], [tabindex]:not([tabindex="-1"]), summary'));
      }
      function keyFor(el) {
        const rect = el.getBoundingClientRect();
        return [el.tagName, label(el), Math.round(rect.left), Math.round(rect.top), Math.round(rect.width), Math.round(rect.height)].join('|');
      }
      async function moveTo(el) {
        el.scrollIntoView({ block: 'center', inline: 'center', behavior: 'smooth' });
        await wait(420);
        const frameRect = frame.getBoundingClientRect();
        const rect = el.getBoundingClientRect();
        const x = frameRect.left + rect.left + rect.width / 2;
        const y = frameRect.top + rect.top + rect.height / 2;
        cursor.style.transform = `translate(${x}px, ${y}px)`;
        highlight.hidden = false;
        highlight.style.left = `${frameRect.left + rect.left}px`;
        highlight.style.top = `${frameRect.top + rect.top}px`;
        highlight.style.width = `${rect.width}px`;
        highlight.style.height = `${rect.height}px`;
        await wait(520);
      }
      async function safeClick(el) {
        const name = label(el);
        await moveTo(el);
        if (isDangerous(el)) {
          actions.push({ type: 'skip-dangerous', label: name });
          log(`Skipped dangerous control: ${name}`);
          return;
        }
        cursor.classList.add('clicking');
        await wait(150);
        try {
          if (el.matches('input, textarea')) {
            el.focus();
            actions.push({ type: 'focus-input', label: name });
          } else {
            el.dispatchEvent(new MouseEvent('pointerdown', { bubbles: true, cancelable: true }));
            el.dispatchEvent(new MouseEvent('mousedown', { bubbles: true, cancelable: true }));
            el.dispatchEvent(new MouseEvent('mouseup', { bubbles: true, cancelable: true }));
            el.click();
            actions.push({ type: 'click', label: name });
          }
          log(`Clicked: ${name}`);
        } catch (error) {
          findings.push({ priority: 'High', title: `Click failed: ${name}`, detail: String(error) });
          actions.push({ type: 'error', label: name, error: String(error) });
        } finally {
          cursor.classList.remove('clicking');
          await wait(760);
        }
      }
      async function runAudit() {
        stopped = false;
        log('Waiting for app frame...');
        await wait(1200);
        const doc = frameDoc();
        if (!doc) {
          await sendReport();
          return;
        }
        log('Starting visual pass.');
        let clicks = 0;
        for (let round = 0; round < 8 && clicks < maxClicks && !stopped; round++) {
          const currentDoc = frameDoc();
          if (!currentDoc) break;
          const controls = selectorList(currentDoc).filter(isVisible);
          if (!controls.length) {
            findings.push({ priority: 'High', title: 'No visible interactive controls found', detail: `Round ${round + 1}` });
            break;
          }
          for (const el of controls) {
            if (stopped || clicks >= maxClicks) break;
            const key = keyFor(el);
            if (visited.has(key)) continue;
            visited.add(key);
            await safeClick(el);
            clicks += 1;
          }
          try { frame.contentWindow.scrollBy({ top: Math.floor(frame.contentWindow.innerHeight * 0.72), behavior: 'smooth' }); }
          catch (_) {}
          await wait(900);
        }
        log('Visual pass finished. Sending report.');
        await sendReport();
      }
      async function sendReport() {
        const report = {
          startedAt,
          finishedAt: new Date().toISOString(),
          target,
          userAgent: navigator.userAgent,
          viewport: { width: innerWidth, height: innerHeight },
          actions,
          findings,
          summary: {
            totalActions: actions.length,
            clicked: actions.filter(a => a.type === 'click').length,
            skippedDangerous: actions.filter(a => a.type === 'skip-dangerous').length,
            issues: findings.length
          }
        };
        log(`Report: ${report.summary.clicked} clicks, ${report.summary.issues} issues.`);
        if (!endpoint) return;
        try {
          await fetch(endpoint, {
            method: 'POST',
            headers: { 'content-type': 'application/json' },
            body: JSON.stringify(report)
          });
          log('Report sent to local server.');
        } catch (error) {
          log(`Could not send report: ${error}`);
        }
      }
      document.getElementById('startBtn').addEventListener('click', runAudit);
      document.getElementById('stopBtn').addEventListener('click', () => { stopped = true; sendReport(); });
      window.addEventListener('error', event => findings.push({ priority: 'High', title: 'Browser error', detail: event.message }));
      if (params.get('autorun') !== '0') {
        frame.addEventListener('load', () => setTimeout(runAudit, 900), { once: true });
      }
    </script>
  </body>
</html>
